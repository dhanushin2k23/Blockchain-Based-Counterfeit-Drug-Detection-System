<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In - Counterfeit Drugs Project</title>
  <style>
    /* Import Google Fonts */
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

    /* Base body styling with white background */
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 0;
      background: #ffffff;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
    }

    .container {
      background: #fff;
      border-radius: 20px;
      padding: 3rem;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.1);
      width: 90%;
      max-width: 400px;
    }

    h2 {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      color: #333;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    input {
      padding: 1rem;
      font-size: 1.2rem;
      border: 2px solid #ddd;
      border-radius: 8px;
      transition: border 0.3s ease, box-shadow 0.3s ease;
      width: 100%;
      box-sizing: border-box;
    }

    input:focus {
      border-color: #007bff;
      box-shadow: 0 0 8px rgba(0,123,255,0.5);
      outline: none;
    }

    /* Blue Button Styling */
    .submit-btn {
      background: linear-gradient(135deg, #007bff, #0056b3);
      border: none;
      border-radius: 50px;
      padding: 1rem;
      font-size: 1.6rem;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .submit-btn:hover {
      transform: translateY(-5px) scale(1.05);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
    }

    /* Blue Sign Up Link */
    .signup-link {
      margin-top: 1.2rem;
      font-size: 1.2rem;
      color: #007bff;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s ease;
      display: block;
    }

    .signup-link:hover {
      color: #0056b3;
    }

    /* Responsive Adjustments */
    @media (max-width: 600px) {
      h2 { font-size: 2.4rem; }
      input { font-size: 1.1rem; padding: 0.9rem; }
      .submit-btn { font-size: 1.4rem; }
      .signup-link { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Sign In</h2>
    <form id="login-form">
      <input type="email" id="email" name="email" placeholder="Email" required>
      <input type="password" id="password" name="password" placeholder="Password" required>
      <button type="submit" class="submit-btn">Sign In</button>
    </form>
    <a href="signup.html" class="signup-link" id="signupLink">Don't have an account? Sign Up</a>
  </div>

  <script>
    // Ensure the signup link works even if JavaScript is preventing it
    document.getElementById("signupLink").addEventListener("click", function(event) {
      event.preventDefault();
      window.location.href = "signup.html"; // Redirect manually
    });
  </script>
</body>
</html>
